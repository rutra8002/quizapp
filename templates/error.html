{% extends "base.html" %}

{% block title %}{{ status_code }} - {{ title }}{% endblock %}

{% block content %}
<div class="hero bg-white rounded-lg border border-gray-200">
    <div class="hero-content text-center py-12">
        <div class="max-w-xl">

            <h1 class="text-5xl font-bold mt-2">{{ status_code }}</h1>
            <h2 class="text-2xl font-semibold mt-3">{{ title }}</h2>
            <p class="py-4 text-gray-600">{{ description }}</p>
            <div class="flex items-center justify-center gap-2">
                <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
                {% if not current_user %}
                <a href="{{ url_for('login') }}" class="btn btn-ghost">Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
