<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Question</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@1.14.0/dist/full.css" rel="stylesheet">
    <style>
        .stats {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <div class="stats">
        <div class="badge badge-primary">Correct Answers: {{ correct_answers }} / {{ total_questions }}</div>
    </div>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold">{{ question }}</h1>
        {% if question != "No more questions!" %}
        <form action="{{ url_for('answer') }}" method="post" class="mt-4">
            <input type="hidden" name="question" value="{{ question }}">
            <input type="text" name="answer" placeholder="Your answer" class="input input-bordered w-full max-w-xs">
            <button type="submit" class="btn btn-primary mt-2">Submit</button>
        </form>
        {% endif %}
    </div>
    <div class="absolute bottom-4 right-4">
        <button class="btn btn-secondary" onclick="toggleTheme()">Toggle Theme</button>
    </div>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'light') {
                html.setAttribute('data-theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
