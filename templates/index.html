<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question</title>
</head>
<body>
    <h1>{{ question }}</h1>
    <form action="{{ url_for('answer') }}" method="post">
        <input type="hidden" name="question" value="{{ question }}">
        <input type="text" name="answer" placeholder="Your answer">
        <button type="submit">Submit</button>
    </form>
</body>
</html>
