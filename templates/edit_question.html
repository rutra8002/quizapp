<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Edit Question</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Edit Question</h1>
        <form action="{{ url_for('edit_question', table_name=table_name, question_id=question.id) }}" method="post">
            <input type="text" name="question" value="{{ question.question }}" class="input input-bordered w-full max-w-xs">
            <input type="text" name="answer" value="{{ question.answer }}" class="input input-bordered w-full max-w-xs mt-2">
            <button type="submit" class="btn btn-primary mt-2">Save Changes</button>
        </form>
    </div>
</body>
</html>
