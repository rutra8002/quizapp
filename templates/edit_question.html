{% extends "base.html" %}

{% block title %}Edit Question{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-base-100 p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6 text-primary">Edit Question</h1>

    <form action="{{ url_for('edit_question', table_name=table_name, question_id=question.id) }}" method="post" class="space-y-4">
        <div class="form-control">
            <label class="label"><span class="label-text font-semibold">Question</span></label>
            <textarea name="question" required class="textarea textarea-bordered h-24 w-full">{{ question.question }}</textarea>
        </div>

        <div class="form-control">
            <label class="label"><span class="label-text font-semibold">Answer</span></label>
            <textarea name="answer" required class="textarea textarea-bordered h-24 w-full">{{ question.answer }}</textarea>
        </div>

        <div class="form-control w-full max-w-xs">
            <label class="label"><span class="label-text font-semibold">Answer Lines</span></label>
            <input type="number" name="answer_lines" value="{{ question.answer_lines if question.answer_lines else 1 }}" min="1" required class="input input-bordered w-full">
        </div>

        <div class="flex gap-2 pt-4">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('edit_table', table_name=table_name) }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
