{% extends "base.html" %}

{% block title %}Admin Panel{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Admin Panel</h1>
<form action="{{ url_for('create_table') }}" method="post" class="mb-4">
    <input
        type="text"
        name="table_name"
        placeholder="New Table Name"
        class="input input-bordered w-full max-w-xs"
        required
        pattern="[A-Za-z_][A-Za-z0-9_]*"
        title="Use letters, numbers, and underscores only; must start with a letter or underscore."
        spellcheck="false"
    >
    <p class="mt-1 text-sm text-base-content/60">Format: start with a letter or underscore, then letters, numbers, or underscores.</p>
    <button type="submit" class="btn btn-primary mt-2">Create Table</button>
</form>
<h2 class="text-xl font-bold mb-4">Existing Tables</h2>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for table_name in table_names %}
        <div class="card shadow-lg bg-base-100">
            <div class="card-body">
                <h2 class="card-title">{{ table_name }}</h2>
                <a href="{{ url_for('edit_table', table_name=table_name) }}" class="btn btn-primary mt-2">Edit Table</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
