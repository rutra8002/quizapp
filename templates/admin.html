<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Admin Panel</h1>
        <form action="{{ url_for('create_table') }}" method="post" class="mb-4">
            <input type="text" name="table_name" placeholder="New Table Name" class="input input-bordered w-full max-w-xs">
            <button type="submit" class="btn btn-primary mt-2">Create Table</button>
        </form>
        <h2 class="text-xl font-bold mb-4">Existing Tables</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for table_name in table_names %}
                <div class="card shadow-lg">
                    <div class="card-body">
                        <h2 class="card-title">{{ table_name }}</h2>
                        <a href="{{ url_for('edit_table', table_name=table_name) }}" class="btn btn-primary mt-2">Edit Table</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
