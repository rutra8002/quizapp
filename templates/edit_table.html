<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Edit Table</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Edit Table: {{ table_name }}</h1>
        <form action="{{ url_for('add_question', table_name=table_name) }}" method="post" class="mb-4">
            <input type="text" name="question" placeholder="Question" class="input input-bordered w-full max-w-xs">
            <input type="text" name="answer" placeholder="Answer" class="input input-bordered w-full max-w-xs mt-2">
            <button type="submit" class="btn btn-primary mt-2">Add Question</button>
        </form>
        <h2 class="text-xl font-bold mb-4">Questions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for question in questions %}
                <div class="card shadow-lg">
                    <div class="card-body">
                        <h2 class="card-title">Question</h2>
                        <p>{{ question.question }}</p>
                        <h2 class="card-title">Answer</h2>
                        <p>{{ question.answer }}</p>
                        <form action="{{ url_for('delete_question', table_name=table_name, question_id=question.id) }}" method="post">
                            <button type="submit" class="btn btn-danger mt-2">Delete</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
