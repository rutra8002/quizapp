<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Question</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .stats-badge { position: absolute; top: 10px; right: 10px; }
  </style>
</head>
<body>
  <div class="stats-badge">
    <div class="badge badge-primary">Points: {{ total_points }} | Questions left {{ total_questions }}</div>
  </div>

  <div class="container mx-auto p-4">
    <div class="card shadow-lg">
      <div class="card-body">
        <h1 class="card-title text-2xl">Question</h1>
        <p class="mt-1">{{ question }}</p>

        <form action="{{ url_for('answer') }}" method="post" class="mt-4">
          <input type="hidden" name="question" value="{{ question }}" />
          <input type="hidden" name="table_name" value="{{ table_name }}" />

          <input
            type="text"
            name="answer"
            placeholder="Your answer"
            class="input input-bordered w-full max-w-xl"
            autofocus
          />

          <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
